<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Session 20 Output</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding-top: 50px; }
        .card { background: white; padding: 20px; margin: auto; width: 350px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #007bff; color: white; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Employee List</h1>
        <table>
            <tr><th>Name</th></tr>
            <tr th:each="emp : ${employees}">
                <td th:text="${emp}">Name</td>
            </tr>
        </table>
        <br>
        <p><small>Use /api/add?name=... to add more</small></p>
    </div>
</body>
</html>
