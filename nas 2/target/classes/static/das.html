<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; margin: 0; background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; gap: 30px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; font-size: 1.4rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        
        .btn-reg { background-color: #3498db; }
        .btn-reg:hover { background-color: #2980b9; }
        
        .btn-login { background-color: #2ecc71; }
        .btn-login:hover { background-color: #27ae60; }
        
        .footer-link { margin-top: 15px; display: block; font-size: 0.9rem; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Register</h2>
        <form action="/add" method="get">
            <input type="text" name="id" placeholder="Create Student ID" required>
            <input type="password" name="pass" placeholder="Create Password" required>
            <button type="submit" class="btn-reg">Create Account</button>
        </form>
    </div>

    <div class="container">
        <h2>Login</h2>
        <form action="/login" method="get">
            <input type="text" name="id" placeholder="Student ID" required>
            <input type="password" name="pass" placeholder="Password" required>
            <button type="submit" class="btn-login">Enter Portal</button>
        </form>
        
    </div>

</body>
</html>
